    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              // Eye-friendly palette (Warm/Paper theme)
              primary: '#4361EE', // Softer Royal Blue
              'primary-dark': '#3046C4',
              secondary: '#10B981', // Emerald is good for eyes
              dark: '#1F2937', // Gray 800 (Softer than black)
              paper: '#FAF9F6', // Warm Off-white
              surface: '#FFFFFF',
              'surface-hover': '#F3F4F6',
              input: '#F9FAFB',
            }
          }
        }
      }
    </script>
    <style>
      /* Custom scrollbar for better aesthetics */
      ::-webkit-scrollbar {
        width: 8px;
        height: 4px; /* Horizontal scrollbar height */
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #d1d5db; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #9ca3af; 
      }
      
      .perspective-1000 {
        perspective: 1000px;
      }
      .transform-style-3d {
        transform-style: preserve-3d;
      }
      .backface-hidden {
        backface-visibility: hidden;
      }
      .rotate-y-180 {
        transform: rotateY(180deg);
      }
      
      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
          -ms-overflow-style: none;  /* IE and Edge */
          scrollbar-width: none;  /* Firefox */
      }

      /* Fix for mobile safari height */
      html, body {
        height: 100dvh;
        background-color: #FAF9F6; /* Global warm background */
      }
      #root {
        height: 100%;
      }
    </style>
